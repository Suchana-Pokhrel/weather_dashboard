flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/weather.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/weather.png"
    icon_size: 48 

name: weatherapi
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  stacked: ^3.4.0
  stacked_services: ^1.1.0
  dio: ^5.9.2
  flutter_dotenv: ^6.0.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  permission_handler: ^12.0.1
  animate_do: ^3.3.4
  stacked_themes: ^0.3.15
  syncfusion_flutter_gauges: ^33.1.47
  syncfusion_flutter_charts: ^33.1.47
  lottie: ^3.3.2

dev_dependencies:
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.1
  stacked_generator: ^1.3.3
  golden_toolkit: ^0.15.0
  flutter_launcher_icons: ^0.14.4
      

flutter:
  uses-material-design: true
  assets:
    - assets/home_element.json
    - assets/flutter_loading_indicator.json
    - assets/weather.png

